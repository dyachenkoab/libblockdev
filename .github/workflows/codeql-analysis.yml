name: "CodeQL and Release"

on:
  push:
    branches: [ "master" ]
    tags: [ "v*" ]                     # запуск при пуше тега v1.0, v2.0 и т.д.
  pull_request:
    branches: [ "master" ]
  schedule:
    - cron: '29 9 * * 4'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag for release (e.g., v1.2.3)'
        required: true
        type: string

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-24.04
    permissions:
      actions: read
      contents: write                   # нужно для создания релиза
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: [ 'cpp', 'python' ]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v4
      with:
        languages: ${{ matrix.language }}

    - name: Install build dependencies
      run: |
        sudo apt -y install ansible
        ansible-playbook -b -i "localhost," -c local misc/install-test-dependencies.yml -e "test_dependencies=false"

    - name: Build
      run: |
        ./autogen.sh && ./configure && make -j

    - name: Package artifacts
      run: |
        make dist-gzip || tar czf libblockdev.tar.gz --transform 's,^,libblockdev-${GITHUB_REF_NAME}/,' *

    - name: Set tag name
      id: tag
      run: |
        if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
          echo "value=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
        else
          echo "value=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
        fi

    - name: Create Release
      if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.tag.outputs.value }}
        name: Release ${{ steps.tag.outputs.value }}
        files: |
          *.tar.gz
        draft: false
        prerelease: false
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v4
      with:
        category: "/language:${{matrix.language}}"
