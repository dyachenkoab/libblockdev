name: "CodeQL and Release"

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  schedule:
    - cron: '29 9 * * 4'
  workflow_dispatch:              # ручной запуск

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-24.04
    permissions:
      actions: read
      contents: write             # нужно для создания релиза
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: [ 'cpp', 'python' ]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    # Инициализация CodeQL
    - name: Initialize CodeQL
      uses: github/codeql-action/init@v4
      with:
        languages: ${{ matrix.language }}

    # Установка зависимостей
    - name: Install build dependencies
      run: |
        sudo apt -y install ansible
        ansible-playbook -b -i "localhost," -c local misc/install-test-dependencies.yml -e "test_dependencies=false"

    # Сборка
    - name: Build
      run: |
        ./autogen.sh && ./configure && make -j

    # Упаковка артефактов (например, создание tar.gz)
    - name: Package artifacts
      if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
      run: |
        make dist-gzip             # если Makefile поддерживает создание дистрибутива
        # или вручную: tar czf libblockdev.tar.gz --transform 's,^,libblockdev-${GITHUB_REF_NAME}/,' *

    # Создание релиза (только для тегов или ручного запуска)
    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
      uses: softprops/action-gh-release@v2
      with:
        files: |
          *.tar.gz
          # можно добавить другие файлы, например, .deb
        draft: false
        prerelease: false
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    # CodeQL анализ
    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v4
      with:
        category: "/language:${{matrix.language}}"
