name: "CodeQL and Release"

on:
  push:
    branches: [ "master" ]
    tags: [ "v*" ]                     # добавлен запуск по тегам
  pull_request:
    branches: [ "master" ]
  schedule:
    - cron: '29 9 * * 4'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version for manual release (e.g., 2.1.0)'
        required: true
        default: '2.1.0'
      create_release:
        description: 'Create GitHub Release'
        type: boolean
        default: false

jobs:
  # Job 1: Анализ CodeQL (оставлен без изменений)
  analyze:
    name: Analyze
    runs-on: ubuntu-24.04
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: [ 'cpp', 'python' ]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v4
      with:
        languages: ${{ matrix.language }}

    - name: Install build dependencies
      run: |
        sudo apt -y install ansible
        ansible-playbook -b -i "localhost," -c local misc/install-test-dependencies.yml -e "test_dependencies=false"

    - name: Build
      run: |
        ./autogen.sh && ./configure && make -j

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v4
      with:
        category: "/language:${{matrix.language}}"

  # Job 2: Сборка DEB-пакета (запускается только после успешного анализа)
  build-deb:
    name: Build DEB package
    runs-on: ubuntu-24.04
    needs: analyze
    permissions:
      contents: write          # нужно для создания релиза
    # Запускаем только при пуше тега или ручном запуске (не при PR и не по расписанию)
    if: |
      github.event_name == 'push' && startsWith(github.ref, 'refs/tags/') ||
      github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      # Устанавливаем зависимости, включая checkinstall
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            autoconf-archive \
            automake \
            libtool \
            pkg-config \
            gtk-doc-tools \
            libglib2.0-dev \
            libcryptsetup-dev \
            libdevmapper-dev \
            libbytesize-dev \
            libparted-dev \
            libyaml-dev \
            ansible \
            checkinstall

      # (Опционально) Дополнительные зависимости через Ansible
      - name: Install extra dependencies with Ansible
        run: |
          ansible-playbook -b -i "localhost," -c local misc/install-test-dependencies.yml -e "test_dependencies=false"

      # Конфигурация и сборка (повторяем, так как в analyze не сохраняются артефакты)
      - name: Configure
        run: ./autogen.sh && ./configure

      - name: Build
        run: make -j$(nproc)

      # Определяем версию пакета
      - name: Set package version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VER="${{ github.event.inputs.version }}"
          else
            VER="${GITHUB_REF_NAME#v}"   # убираем 'v' из тега
          fi
          echo "version=$VER" >> $GITHUB_OUTPUT
          echo "Package version: $VER"

      # Создаём DEB-пакет с checkinstall (без установки)
      - name: Create DEB package with checkinstall
        id: create_deb
        run: |
          sudo checkinstall \
            --fstrans=yes \
            --install=no \
            --pkgname=libblockdev \
            --pkgversion="${{ steps.version.outputs.version }}" \
            --pkgrelease="1" \
            --pkglicense="LGPL" \
            --pkggroup="libs" \
            --maintainer="builder@github.com" \
            --pakdir="$(pwd)/debian-packages" \
            --nodoc \
            --strip=no \
            --stripso=no \
            --addso=yes \
            --gzman=yes \
            --deldoc=yes \
            --deldesc=yes \
            --backup=no \
            make install

          DEB_FILE=$(ls debian-packages/*.deb | head -n1)
          echo "deb_file=$DEB_FILE" >> $GITHUB_OUTPUT
          echo "Created package: $DEB_FILE"

      # Загружаем DEB-пакет как артефакт
      - name: Upload DEB package as artifact
        uses: actions/upload-artifact@v4
        with:
          name: libblockdev-deb-package
          path: ${{ steps.create_deb.outputs.deb_file }}
          if-no-files-found: error

      # Создаём релиз и прикрепляем пакет (при ручном запуске или пуше тега)
      - name: Create Release
        if: |
          github.event_name == 'push' && startsWith(github.ref, 'refs/tags/') ||
          (github.event_name == 'workflow_dispatch' && github.event.inputs.create_release == 'true')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'push' && github.ref_name || steps.version.outputs.version }}
          name: Release ${{ steps.version.outputs.version }}
          files: ${{ steps.create_deb.outputs.deb_file }}
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
